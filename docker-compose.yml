services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=mysql://root:rootpassword@db:3306/tms_db
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      # build the frontend pointing at the backend (override for real deploys)
      args:
        VITE_API_URL: http://localhost:5000
        VITE_WS_URL: http://localhost:5000
    ports:
      - "5173:80"
    depends_on:
      - backend

  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tms_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    # wait until mysql is actually ready before the backend starts
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
